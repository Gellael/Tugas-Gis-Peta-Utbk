<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Navigasi UTBK UNIB</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            background: #f8fafc;
        }

        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            padding: 20px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-card {
            background: white; padding: 40px; border-radius: 32px;
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            max-height: 90vh; overflow-y: auto;
        }

        .hero-icon {
            width: 70px; height: 70px; background: #e0f2fe; color: var(--primary);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 20px;
        }

        .hero-card h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .hero-card p { margin: 8px 0 25px; color: var(--text-sub); font-size: 0.9rem; }

        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; text-align: left; margin-bottom: 8px; }
        
        select {
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9;
            background: #f8fafc; font-family: inherit; font-size: 0.95rem; font-weight: 600;
            margin-bottom: 20px; outline: none; cursor: pointer;
        }
        optgroup { font-weight: 800; color: var(--primary); }
        option { font-weight: 500; color: var(--text-main); }

        .btn-start {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 14px; font-family: inherit; font-size: 1rem;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px;
        }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; visibility: hidden; }
        #map.active { visibility: visible; }

        .map-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; align-items: center; gap: 12px;
        }

        .btn-back {
            background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* BOTTOM SHEET PANEL */
        .route-panel {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            border-radius: 24px 24px 0 0;
            display: none; flex-direction: column;
            max-height: 55vh; transition: transform 0.3s ease;
        }
        .route-panel.collapsed .route-instructions { display: none; }
        .route-panel.collapsed #toggle-icon { transform: rotate(180deg); }

        .route-header {
            padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .route-header h3 { margin: 0; font-size: 1.1rem; color: var(--text-main); font-weight: 800; }
        .route-header p { margin: 4px 0 0 0; font-size: 0.85rem; color: var(--primary); font-weight: 700; }
        
        .route-instructions { padding: 0 24px 20px; overflow-y: auto; flex: 1; }
        .step {
            display: flex; align-items: center; gap: 16px; padding: 14px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05); color: var(--text-main);
        }
        .step:last-child { border-bottom: none; }
        .step-icon {
            width: 36px; height: 36px; background: #e0f2fe; color: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; flex-shrink: 0;
        }
        .step-text { font-size: 0.9rem; font-weight: 600; line-height: 1.4; }
        .step-dist { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-sub); margin-top: 2px; }

        @media (min-width: 768px) {
            .route-panel {
                bottom: 20px; left: 20px; right: auto; width: 380px;
                border-radius: 24px; border: 1px solid rgba(255,255,255,0.5); max-height: 70vh;
            }
        }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="hero-card">
            <div class="hero-icon"><i class="ri-map-pin-user-fill"></i></div>
            <h1>Navigasi UNIB</h1>
            <p>Pilih Rute UTBK Anda</p>

            <label>Titik Awal Anda</label>
            <select id="start">
                <option value="user">📍 Lokasi Saya Saat Ini (GPS)</option>
                <option value="gerbang">Gerbang Depan UNIB (Simulasi)</option>
                <option value="pantai">Pantai Panjang (Simulasi Jauh)</option>
            </select>

            <label>Gedung Tujuan</label>
            <select id="dest">
                <optgroup label="Pusat & Fasilitas Utama">
                    <option value="lptik">LPTIK (Lab Komputer Utama)</option>
                    <option value="rektorat">Gedung Rektorat</option>
                    <option value="auditorium">Auditorium UNIB</option>
                    <option value="perpus">Perpustakaan Pusat</option>
                    <option value="gkb">Gedung Kuliah Bersama (GKB)</option>
                </optgroup>
                <optgroup label="Fakultas (Grup A)">
                    <option value="fkip">FKIP (Ilmu Pendidikan)</option>
                    <option value="ft">Fakultas Teknik</option>
                    <option value="mipa">Fakultas MIPA</option>
                    <option value="fk">Fakultas Kedokteran</option>
                </optgroup>
                <optgroup label="Fakultas (Grup B)">
                    <option value="feb">Fakultas Ekonomi & Bisnis</option>
                    <option value="fh">Fakultas Hukum</option>
                    <option value="fisip">Fakultas Ilmu Sosial & Politik</option>
                    <option value="fp">Fakultas Pertanian</option>
                </optgroup>
            </select>

            <button class="btn-start" id="btn-start">
                Buka Peta Navigasi <i class="ri-direction-fill"></i>
            </button>
        </div>
    </div>

    <div class="map-overlay" id="ui">
        <button class="btn-back" id="btn-back"><i class="ri-arrow-left-line"></i></button>
        <span id="label" style="font-weight: 700; font-size: 0.85rem;"></span>
    </div>

    <div class="route-panel" id="route-panel">
        <div class="route-header" id="panel-toggle">
            <div>
                <h3 id="panel-title">Mencari Rute...</h3>
                <p id="panel-meta">Mohon tunggu sebentar</p>
            </div>
            <i class="ri-arrow-down-s-line" id="toggle-icon" style="font-size: 1.5rem; color: #64748b;"></i>
        </div>
        <div class="route-instructions" id="instruction-list"></div>
    </div>

    <div id="map"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
