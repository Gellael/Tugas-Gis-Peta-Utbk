<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Navigasi UTBK UNIB</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            background: #f8fafc;
        }

        /* --- LANDING PAGE --- */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            padding: 20px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-card {
            background: white; padding: 40px; border-radius: 32px;
            width: 100%; max-width: 420px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .hero-icon {
            width: 70px; height: 70px; background: #e0f2fe; color: var(--primary);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 20px;
        }

        .hero-card h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .hero-card p { margin: 8px 0 25px; color: var(--text-sub); font-size: 0.9rem; }

        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; text-align: left; margin-bottom: 8px; }
        
        select {
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9;
            background: #f8fafc; font-family: inherit; font-size: 0.95rem; font-weight: 600;
            margin-bottom: 20px; outline: none;
        }

        .btn-start {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 14px; font-family: inherit; font-size: 1rem;
            font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- MAP PAGE --- */
        #map { 
            position: absolute; top: 0; bottom: 0; left: 0; right: 0; 
            z-index: 1; visibility: hidden; 
        }
        
        #map.active { visibility: visible; }

        .map-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; align-items: center; gap: 12px;
        }

        .btn-back {
            background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Routing UI Hide */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="hero-card">
            <div class="hero-icon"><i class="ri-navigation-fill"></i></div>
            <h1>Navigasi UNIB</h1>
            <p>Pilih Lokasi Gedung UTBK Anda</p>

            <label>Tujuan Gedung</label>
            <select id="dest">
                <option value="lptik">LPTIK (Lab Komputer Utama)</option>
                <option value="rektorat">Gedung Rektorat</option>
                <option value="perpus">Perpustakaan Pusat</option>
                <option value="fkip">FKIP (Gedung Kuliah Bersama)</option>
                <option value="ft">Fakultas Teknik</option>
                <option value="mipa">Fakultas MIPA</option>
                <option value="feb">Fakultas Ekonomi</option>
            </select>

            <button class="btn-start" onclick="goNav()">
                Buka Peta <i class="ri-map-2-line"></i>
            </button>
        </div>
    </div>

    <div class="map-overlay" id="ui">
        <button class="btn-back" onclick="location.reload()"><i class="ri-arrow-left-line"></i></button>
        <span id="label" style="font-weight: 700; font-size: 0.85rem;"></span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        const unib = {
            gerbang: [-3.755455, 102.272185],
            rektorat: [-3.757820, 102.272550],
            lptik: [-3.759240, 102.273880],
            perpus: [-3.760120, 102.272250],
            fkip: [-3.761800, 102.275100],
            ft: [-3.762850, 102.271300],
            mipa: [-3.764500, 102.274000],
            feb: [-3.758800, 102.275500]
        };

        let map, route;

        // Init Map tapi sembunyikan dulu
        map = L.map('map', { zoomControl: false }).setView(unib.lptik, 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function goNav() {
            const el = document.getElementById('dest');
            const target = unib[el.value];
            document.getElementById('label').innerText = el.options[el.selectedIndex].text;

            // Transisi UI
            document.getElementById('landing-page').style.transform = "translateY(-100%)";
            document.getElementById('map').classList.add('active');
            document.getElementById('ui').style.display = "flex";

            // PENTING: Fix rute bergeser
            setTimeout(() => {
                map.invalidateSize(); // Memaksa peta menghitung ulang ukuran container
                startRouting(target);
            }, 600);
        }

        function startRouting(dest) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => draw([p.coords.latitude, p.coords.longitude], dest),
                    () => draw(unib.gerbang, dest)
                );
            }
        }

        function draw(start, end) {
            if (route) map.removeControl(route);

            route = L.Routing.control({
                waypoints: [L.latLng(start), L.latLng(end)],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'foot' }),
                lineOptions: { styles: [{ color: '#2563eb', weight: 6, opacity: 0.8 }] },
                addWaypoints: false, draggableWaypoints: false,
                createMarker: (i, wp) => L.marker(wp.latLng).bindPopup(i === 0 ? "Anda" : "Tujuan")
            }).addTo(map);

            route.on('routesfound', (e) => {
                map.fitBounds(L.latLngBounds(e.routes[0].coordinates), { padding: [50, 50] });
            });
        }
    </script>
</body>
</html>
